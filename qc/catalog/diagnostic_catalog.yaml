# Seqcolyte diagnostic catalog (seqcolyte.diagnostic_catalog.v1)
#
# Single source of truth for the diagnostic vocabulary: canonical metrics, observed signals,
# user-facing issue families, candidate root causes, diagnostic tests, and recovery actions.
# Authored here as YAML; validated against schema.json + cross-reference checks; rendered to
# spec/diagnostics/catalog.json (studio) and docs/qc/*.md by `python -m qc.catalog render`.
#
# Rules honoured while seeding:
#   - representative subset: the low-cell-recovery + low-informative-yield families and everything
#     they reference; the remaining families are deferred (see plan). Every referenced id resolves.
#   - no fabricated thresholds: quantitative claims only appear with a reference id attached.
#   - strand-aware: the 10x 3' TSO and its reverse complement are distinct sequences/events.
#   - poly-G is modelled as a supporting SIGNAL of read-past-end / signal decay, not a root cause.

catalog_version: "0.1.0"

# ---------------------------------------------------------------------------------------------
references:
  - reference_id: ref.tenx_3p_v3_userguide
    title: "Chromium Single Cell 3' Reagent Kits v3 / v3.1 User Guide"
    source: "10x Genomics"
    assay_context: "10x Chromium 3' gene expression (v3/v3.1): 16 nt cell barcode, 12 nt UMI, TSO = AAGCAGTGGTATCAACGCAGAGTACATGGG"
    evidence_strength: strong
  - reference_id: ref.cellranger_web_summary
    title: "Cell Ranger web summary metric definitions"
    source: "10x Genomics Cell Ranger documentation"
    assay_context: "Short-read single-cell analysis (Estimated Number of Cells, Valid Barcodes, Reads Mapped to Genome, Sequencing Saturation, ...)"
    evidence_strength: strong
  - reference_id: ref.wf_single_cell_docs
    title: "EPI2ME wf-single-cell workflow documentation"
    source: "Oxford Nanopore Technologies / EPI2ME Labs"
    url: "https://epi2me.nanoporetech.com/epi2me-docs/workflows/wf-single-cell/"
    assay_context: "Long-read single-cell analysis report (estimated cells, full-length reads, adapter configuration, gene/transcript assignment)"
    evidence_strength: strong
  - reference_id: ref.lebrigand_2020
    title: "High throughput error corrected Nanopore single cell transcriptome sequencing (ScNaUmi-seq / Sicelore)"
    source: "Lebrigand et al., Nature Communications 2020"
    url: "https://www.nature.com/articles/s41467-020-17800-6"
    assay_context: "Long-read 10x 3' single-cell; barcode/UMI recovery and full-length transcript assignment on Nanopore"
    evidence_strength: strong

# ---------------------------------------------------------------------------------------------
recovery_actions:
  - recovery_class: computationally_recoverable
    label: "Computationally recoverable"
    description: "The signal can be corrected in silico from existing data (e.g. re-extract barcodes at a corrected offset, re-run cell calling) without new sequencing or a new library."
  - recovery_class: partially_recoverable
    label: "Partially recoverable"
    description: "Some information can be rescued computationally, but a fraction is unrecoverable from the current data."
  - recovery_class: recoverable_by_additional_sequencing
    label: "Recoverable by additional sequencing"
    description: "The existing library is sound but under-sequenced for the goal; more sequencing recovers the signal."
  - recovery_class: requires_library_rebuild
    label: "Requires library rebuild"
    description: "The molecular library itself is compromised; recovery needs a new library from retained material."
  - recovery_class: requires_experiment_rerun
    label: "Requires experiment rerun"
    description: "The defect originates upstream of library prep (e.g. cell input); recovery needs a new experiment."
  - recovery_class: unknown
    label: "Unknown / insufficient evidence"
    description: "Available evidence does not determine recoverability."

# ---------------------------------------------------------------------------------------------
metrics:
  # --- sequencing_run ---
  - metric_id: run.reads_total
    label: "Total reads"
    description: "Total reads (or read pairs) produced by the run before quality filtering."
    domain: sequencing_run
    unit: count
    value_type: integer
    direction: descriptive
    scoreability: descriptive
    required_scopes: [sequencing_run]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    aliases:
      - { label: "Input reads", producer: "wf-single-cell", source_scope: sequencing_run }
      - { label: "Number of Reads", producer: "cellranger-like", source_scope: sequencing_run }
  - metric_id: run.reads_pass
    label: "Pass reads"
    description: "Reads passing the run/basecaller quality filter."
    domain: sequencing_run
    unit: count
    value_type: integer
    direction: higher_is_better
    scoreability: profile_dependent
    required_scopes: [sequencing_run]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    aliases:
      - { label: "Pass reads", producer: "wf-single-cell", source_scope: sequencing_run }
  - metric_id: run.reads_pass_fraction
    label: "Pass-read fraction"
    description: "Fraction of produced reads that pass the quality filter."
    domain: sequencing_run
    unit: fraction
    value_type: fraction
    direction: higher_is_better
    scoreability: profile_dependent
    required_scopes: [sequencing_run]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    denominator: "reads passing quality / total reads produced"

  # --- read_processing: barcode + UMI ---
  - metric_id: barcode.extractable_fraction
    label: "Barcode-extractable fraction"
    description: "Fraction of reads from which a candidate cell barcode could be extracted at the expected position (before whitelist matching)."
    domain: read_processing
    unit: fraction
    value_type: fraction
    direction: higher_is_better
    scoreability: scoreable
    required_scopes: [read_processing]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    denominator: "reads with an extractable barcode / reads examined"
  - metric_id: barcode.whitelist_fraction
    label: "Barcode whitelist-match fraction"
    description: "Fraction of reads whose extracted barcode matches the chemistry whitelist exactly, before error correction."
    domain: read_processing
    unit: fraction
    value_type: fraction
    direction: higher_is_better
    scoreability: scoreable
    required_scopes: [read_processing]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    denominator: "reads with exact whitelist match / reads with an extracted barcode"
    caveats:
      - "Denominator differs between producers; do not merge with barcode.valid_fraction unless the definition matches."
    references: [ref.tenx_3p_v3_userguide]
  - metric_id: barcode.valid_fraction
    label: "Valid-barcode fraction"
    description: "Fraction of reads assigned to a valid barcode after whitelist matching and error correction."
    domain: read_processing
    unit: fraction
    value_type: fraction
    direction: higher_is_better
    scoreability: scoreable
    required_scopes: [read_processing]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    denominator: "reads with a valid (corrected) barcode / reads examined"
    aliases:
      - { label: "Valid Barcodes", producer: "cellranger-like", source_scope: read_processing, denominator: "reads with a barcode matching the whitelist after correction" }
      - { label: "Valid barcode", producer: "wf-single-cell", source_scope: read_processing }
    references: [ref.cellranger_web_summary]
  - metric_id: barcode.corrected_fraction
    label: "Barcode-corrected fraction"
    description: "Fraction of valid barcodes that required one-mismatch error correction to reach the whitelist."
    domain: read_processing
    unit: fraction
    value_type: fraction
    direction: descriptive
    scoreability: descriptive
    required_scopes: [read_processing]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
  - metric_id: umi.extractable_fraction
    label: "UMI-extractable fraction"
    description: "Fraction of reads from which a UMI of the expected length could be extracted at the expected position."
    domain: read_processing
    unit: fraction
    value_type: fraction
    direction: higher_is_better
    scoreability: scoreable
    required_scopes: [read_processing]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
  - metric_id: umi.valid_fraction
    label: "Valid-UMI fraction"
    description: "Fraction of reads carrying a structurally valid UMI (correct length, not a homopolymer/low-complexity artifact)."
    domain: read_processing
    unit: fraction
    value_type: fraction
    direction: higher_is_better
    scoreability: scoreable
    required_scopes: [read_processing]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]

  # --- library_structure ---
  - metric_id: library.full_length_proxy_fraction
    label: "Full-length-proxy fraction"
    description: "Fraction of reads matching the expected full-length architecture (both flanking adapters/handles in the expected orientation)."
    domain: library_structure
    unit: fraction
    value_type: fraction
    direction: higher_is_better
    scoreability: scoreable
    required_scopes: [library_structure]
    platforms: [nanopore, pacbio]
    assays: [long_read_single_cell]
    aliases:
      - { label: "% full length reads", producer: "wf-single-cell", source_scope: library_structure }
      - { label: "Full length", producer: "wf-single-cell", source_scope: library_structure }
    references: [ref.wf_single_cell_docs]
  - metric_id: library.adapter_only_fraction
    label: "Adapter-only fraction"
    description: "Fraction of reads composed essentially of adapter/handle sequence with no meaningful insert (adapter dimers)."
    domain: library_structure
    unit: fraction
    value_type: fraction
    direction: lower_is_better
    scoreability: scoreable
    required_scopes: [library_structure]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    caveats:
      - "A physical adapter-dimer percentage in the library is not equal to the sequenced-read percentage unless cluster-generation bias is modelled."
  - metric_id: library.short_insert_fraction
    label: "Short-insert fraction"
    description: "Fraction of reads whose inferred insert is shorter than expected, causing adapter read-through into the read."
    domain: library_structure
    unit: fraction
    value_type: fraction
    direction: lower_is_better
    scoreability: scoreable
    required_scopes: [library_structure]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
  - metric_id: library.tso_at_rna_read_start_fraction
    label: "TSO-at-RNA-read-start fraction (short-read)"
    description: "Fraction of short-read cDNA reads that begin with template-switch-oligo-derived sequence, indicating short/empty cDNA products. Strand-specific: the 10x 3' TSO (AAGCAGTGGTATCAACGCAGAGTACATGGG) is distinct from its reverse complement TSO_RC (CCCATGTACTCTGCGTTGATACCACTGCTT)."
    domain: library_structure
    unit: fraction
    value_type: fraction
    direction: lower_is_better
    scoreability: scoreable
    required_scopes: [library_structure]
    platforms: [illumina]
    assays: [single_cell_3p]
    references: [ref.tenx_3p_v3_userguide]
  - metric_id: library.internal_adapter_fraction
    label: "Internal-adapter fraction (long-read)"
    description: "Fraction of long reads containing internal adapter/TSO-derived motifs mid-read, indicating concatemers or fused molecules. This is a distinct diagnostic event from short-read TSO read-through at the read start."
    domain: library_structure
    unit: fraction
    value_type: fraction
    direction: lower_is_better
    scoreability: scoreable
    required_scopes: [library_structure]
    platforms: [nanopore, pacbio]
    assays: [long_read_single_cell]
    references: [ref.lebrigand_2020]
  - metric_id: library.polyg_tail_fraction
    label: "Poly-G tail fraction"
    description: "Fraction of reads ending in a poly-G run (two-colour Illumina no-signal) or an equivalent no-signal tail. A supporting signal of read-past-end / signal decay, not an independent root cause."
    domain: library_structure
    unit: fraction
    value_type: fraction
    direction: lower_is_better
    scoreability: scoreable
    required_scopes: [library_structure]
    platforms: [illumina]
    assays: [single_cell_rna]
  - metric_id: library.unclassified_fraction
    label: "Unclassified-read fraction"
    description: "Fraction of reads that do not match any expected library configuration."
    domain: library_structure
    unit: fraction
    value_type: fraction
    direction: lower_is_better
    scoreability: scoreable
    required_scopes: [library_structure]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]

  # --- alignment_assignment ---
  - metric_id: mapping.genome_fraction
    label: "Genome-mapped fraction"
    description: "Fraction of reads mapping to the reference genome."
    domain: alignment_assignment
    unit: fraction
    value_type: fraction
    direction: higher_is_better
    scoreability: scoreable
    required_scopes: [alignment_assignment]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    aliases:
      - { label: "Reads Mapped to Genome", producer: "cellranger-like", source_scope: alignment_assignment }
      - { label: "Mapped", producer: "wf-single-cell", source_scope: alignment_assignment }
  - metric_id: mapping.primary_fraction
    label: "Primary-alignment fraction"
    description: "Fraction of reads with a primary alignment."
    domain: alignment_assignment
    unit: fraction
    value_type: fraction
    direction: higher_is_better
    scoreability: scoreable
    required_scopes: [alignment_assignment]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
  - metric_id: mapping.unmapped_fraction
    label: "Unmapped fraction"
    description: "Fraction of reads with no acceptable alignment."
    domain: alignment_assignment
    unit: fraction
    value_type: fraction
    direction: lower_is_better
    scoreability: scoreable
    required_scopes: [alignment_assignment]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    aliases:
      - { label: "Unmapped", producer: "wf-single-cell", source_scope: alignment_assignment }
  - metric_id: mapping.supplementary_fraction
    label: "Supplementary-alignment fraction"
    description: "Fraction of reads with supplementary (chimeric/split) alignments; elevated values can indicate fused/concatemeric molecules."
    domain: alignment_assignment
    unit: fraction
    value_type: fraction
    direction: descriptive
    scoreability: descriptive
    required_scopes: [alignment_assignment]
    platforms: [nanopore, pacbio]
    assays: [long_read_single_cell]
    aliases:
      - { label: "Supplementary", producer: "wf-single-cell", source_scope: alignment_assignment }
  - metric_id: assignment.gene_fraction
    label: "Gene-assigned fraction"
    description: "Fraction of reads confidently assigned to a gene/feature."
    domain: alignment_assignment
    unit: fraction
    value_type: fraction
    direction: higher_is_better
    scoreability: scoreable
    required_scopes: [alignment_assignment]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    aliases:
      - { label: "Gene assigned", producer: "wf-single-cell", source_scope: alignment_assignment }
  - metric_id: assignment.transcript_fraction
    label: "Transcript-assigned fraction"
    description: "Fraction of reads confidently assigned to a transcript/isoform."
    domain: alignment_assignment
    unit: fraction
    value_type: fraction
    direction: higher_is_better
    scoreability: scoreable
    required_scopes: [alignment_assignment]
    platforms: [nanopore, pacbio]
    assays: [long_read_single_cell]
    aliases:
      - { label: "Transcript assigned", producer: "wf-single-cell", source_scope: alignment_assignment }
  - metric_id: assignment.unique_genes
    label: "Unique genes detected"
    description: "Number of distinct genes detected across the dataset."
    domain: alignment_assignment
    unit: count
    value_type: integer
    direction: higher_is_better
    scoreability: descriptive
    required_scopes: [alignment_assignment]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    aliases:
      - { label: "Unique genes", producer: "wf-single-cell", source_scope: alignment_assignment }
  - metric_id: assignment.unique_isoforms
    label: "Unique isoforms detected"
    description: "Number of distinct isoforms detected across the dataset."
    domain: alignment_assignment
    unit: count
    value_type: integer
    direction: higher_is_better
    scoreability: descriptive
    required_scopes: [alignment_assignment]
    platforms: [nanopore, pacbio]
    assays: [long_read_single_cell]
    aliases:
      - { label: "Unique isoforms", producer: "wf-single-cell", source_scope: alignment_assignment }

  # --- cell_analysis ---
  - metric_id: cell.target_count
    label: "Target cell count"
    description: "The declared cell target for the library. Its meaning depends on the target type (cells loaded, expected recovered cells, ...); do not compare it to called cells across incompatible target types."
    domain: cell_analysis
    unit: count
    value_type: integer
    direction: descriptive
    scoreability: target_dependent
    required_scopes: [cell_analysis]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    target_dependency: "Interpretation depends on the input-manifest cell_target.target_type."
  - metric_id: cell.called_count
    label: "Called cell count"
    description: "Number of barcodes called as real cells by the cell-calling step."
    domain: cell_analysis
    unit: count
    value_type: integer
    direction: descriptive
    scoreability: target_dependent
    required_scopes: [cell_analysis]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    aliases:
      - { label: "Estimated Number of Cells", producer: "cellranger-like", source_scope: cell_analysis }
      - { label: "Estimated cells", producer: "wf-single-cell", source_scope: cell_analysis }
    references: [ref.cellranger_web_summary]
  - metric_id: cell.target_attainment
    label: "Target attainment"
    description: "Called cells divided by the target cell count. Only meaningful when the target type is compatible with called cells."
    domain: cell_analysis
    unit: ratio
    value_type: float
    direction: higher_is_better
    scoreability: target_dependent
    required_scopes: [cell_analysis]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    denominator: "cell.called_count / cell.target_count"
    target_dependency: "Undefined unless cell_target.target_type is expected_recovered_cells or expected_called_cells."
  - metric_id: cell.reads_in_cells_fraction
    label: "Fraction reads in cells"
    description: "Fraction of valid-barcode reads that belong to barcodes called as cells."
    domain: cell_analysis
    unit: fraction
    value_type: fraction
    direction: higher_is_better
    scoreability: scoreable
    required_scopes: [cell_analysis]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    aliases:
      - { label: "Fraction Reads in Cells", producer: "cellranger-like", source_scope: cell_analysis }
  - metric_id: cell.mean_reads
    label: "Mean reads per cell"
    description: "Mean number of reads per called cell."
    domain: cell_analysis
    unit: count
    value_type: float
    direction: descriptive
    scoreability: profile_dependent
    required_scopes: [cell_analysis]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    aliases:
      - { label: "Mean Reads per Cell", producer: "cellranger-like", source_scope: cell_analysis }
      - { label: "Reads per cell (mean)", producer: "wf-single-cell", source_scope: cell_analysis }
  - metric_id: cell.median_genes
    label: "Median genes per cell"
    description: "Median number of genes detected per called cell."
    domain: cell_analysis
    unit: count
    value_type: float
    direction: higher_is_better
    scoreability: profile_dependent
    required_scopes: [cell_analysis]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    aliases:
      - { label: "Median Genes per Cell", producer: "cellranger-like", source_scope: cell_analysis }
      - { label: "Genes per cell (median)", producer: "wf-single-cell", source_scope: cell_analysis }
  - metric_id: cell.median_umis
    label: "Median UMIs per cell"
    description: "Median number of UMIs (unique molecules) per called cell."
    domain: cell_analysis
    unit: count
    value_type: float
    direction: higher_is_better
    scoreability: profile_dependent
    required_scopes: [cell_analysis]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    aliases:
      - { label: "Median UMI Counts per Cell", producer: "cellranger-like", source_scope: cell_analysis }
      - { label: "UMIs per cell (median)", producer: "wf-single-cell", source_scope: cell_analysis }
  - metric_id: cell.barcode_rank_separation
    label: "Barcode-rank knee separation"
    description: "Descriptive measure of how cleanly the barcode-rank (knee) plot separates cells from background; a poor separation implies ambiguous cell calling."
    domain: cell_analysis
    unit: dimensionless
    value_type: float
    direction: descriptive
    scoreability: descriptive
    required_scopes: [cell_analysis]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]

  # --- complexity_expression ---
  - metric_id: complexity.sequencing_saturation
    label: "Sequencing saturation"
    description: "Fraction of reads that are duplicates of already-observed (barcode, UMI, gene) molecules; a measure of how completely the library has been sampled."
    domain: complexity_expression
    unit: fraction
    value_type: fraction
    direction: descriptive
    scoreability: profile_dependent
    required_scopes: [complexity_expression]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]
    aliases:
      - { label: "Sequencing Saturation", producer: "cellranger-like", source_scope: complexity_expression }
    references: [ref.cellranger_web_summary]
  - metric_id: complexity.duplicate_fraction
    label: "Duplicate fraction"
    description: "Fraction of reads that are PCR/optical duplicates."
    domain: complexity_expression
    unit: fraction
    value_type: fraction
    direction: descriptive
    scoreability: profile_dependent
    required_scopes: [complexity_expression]
    platforms: [illumina, nanopore]
    assays: [single_cell_rna]

# ---------------------------------------------------------------------------------------------
signals:
  - signal_id: signal.called_cells_below_target
    label: "Called-cell count far below the declared target"
    description: "The number of called cells is much lower than the declared cell target."
    metrics: [cell.called_count, cell.target_count, cell.target_attainment]
    platforms: [illumina, nanopore]
    related_causes: [cause.barcode_boundary_shift, cause.read_configuration_mismatch, cause.overly_strict_cell_calling, cause.insufficient_viable_cell_input]
  - signal_id: signal.low_reads_in_cells
    label: "Low fraction of reads in cells"
    description: "A small fraction of valid-barcode reads belong to called cells, suggesting ambient/background dominance or poor capture."
    metrics: [cell.reads_in_cells_fraction]
    platforms: [illumina, nanopore]
    related_causes: [cause.poor_partition_capture_or_rt, cause.low_cdna_or_library_yield]
  - signal_id: signal.barcode_rank_no_knee
    label: "Barcode-rank plot lacks a clear knee"
    description: "The barcode-rank curve does not show a clean separation between cells and background."
    metrics: [cell.barcode_rank_separation]
    platforms: [illumina, nanopore]
    related_causes: [cause.overly_strict_cell_calling, cause.insufficient_viable_cell_input]
  - signal_id: signal.low_whitelist_match
    label: "Barcode whitelist match is low"
    description: "Few reads carry a barcode matching the chemistry whitelist."
    metrics: [barcode.whitelist_fraction, barcode.valid_fraction]
    platforms: [illumina, nanopore]
    related_causes: [cause.barcode_boundary_shift, cause.wrong_chemistry_or_whitelist, cause.read_configuration_mismatch]
  - signal_id: signal.low_barcode_umi_extractable
    label: "Barcode/UMI cannot be extracted at the expected position"
    description: "Few reads yield an extractable barcode or UMI at the expected offsets."
    metrics: [barcode.extractable_fraction, umi.extractable_fraction]
    platforms: [illumina, nanopore]
    related_causes: [cause.read_configuration_mismatch, cause.barcode_boundary_shift]
  - signal_id: signal.elevated_adapter_only
    label: "Adapter-only reads are elevated"
    description: "An elevated fraction of reads are adapter/handle-only (adapter dimers)."
    metrics: [library.adapter_only_fraction]
    platforms: [illumina, nanopore]
    related_causes: [cause.adapter_dimer_or_short_insert]
  - signal_id: signal.short_insert_elevated
    label: "Short-insert / adapter read-through elevated"
    description: "An elevated fraction of reads read through into the adapter, implying short inserts."
    metrics: [library.short_insert_fraction]
    platforms: [illumina, nanopore]
    related_causes: [cause.adapter_dimer_or_short_insert, cause.short_or_empty_cdna_products, cause.read_past_end_or_signal_decay]
  - signal_id: signal.tso_at_read_start
    label: "TSO-derived sequence at the start of a short-read cDNA read"
    description: "Short-read cDNA reads begin with TSO-derived sequence, implying short/empty cDNA products. Distinct from internal long-read TSO motifs."
    metrics: [library.tso_at_rna_read_start_fraction]
    platforms: [illumina]
    related_causes: [cause.short_or_empty_cdna_products]
    references: [ref.tenx_3p_v3_userguide]
  - signal_id: signal.internal_adapter_elevated
    label: "Internal adapter/TSO motifs in long reads"
    description: "Long reads contain internal adapter/TSO-derived motifs mid-read, implying concatemers or fused molecules."
    metrics: [library.internal_adapter_fraction]
    platforms: [nanopore, pacbio]
    related_causes: [cause.long_read_tso_concatemer_or_fusion]
    references: [ref.lebrigand_2020]
  - signal_id: signal.polyg_tail_elevated
    label: "Poly-G / no-signal tails elevated"
    description: "An elevated fraction of reads end in poly-G (two-colour no-signal) tails. This is a SUPPORTING signal of read-past-end or signal decay, not an independent root cause."
    metrics: [library.polyg_tail_fraction]
    platforms: [illumina]
    is_root_cause: false
    related_causes: [cause.read_past_end_or_signal_decay, cause.adapter_dimer_or_short_insert]
  - signal_id: signal.low_full_length_proxy
    label: "Low full-length-proxy fraction"
    description: "Few long reads match the expected full-length architecture."
    metrics: [library.full_length_proxy_fraction]
    platforms: [nanopore, pacbio]
    related_causes: [cause.short_or_empty_cdna_products, cause.long_read_tso_concatemer_or_fusion]
    references: [ref.wf_single_cell_docs]
  - signal_id: signal.high_genome_low_gene_assignment
    label: "Genome mapping high but gene assignment low"
    description: "Reads map to the genome at a high rate but are assigned to genes/features at a low rate."
    metrics: [mapping.genome_fraction, assignment.gene_fraction]
    platforms: [illumina, nanopore]

# ---------------------------------------------------------------------------------------------
root_causes:
  - cause_id: cause.barcode_boundary_shift
    title: "Barcode boundary shift"
    mechanism: "Barcode/UMI extraction is offset by a few bases from the true position (e.g. unexpected upstream trimming or a wrong offset), so extracted barcodes rarely match the whitelist and valid-barcode reads collapse."
    workflow_stage: read_processing
    produces_issues: [issue.barcode_umi_recovery_failure, issue.low_cell_recovery]
    observable_signals: [signal.low_whitelist_match, signal.low_barcode_umi_extractable, signal.called_cells_below_target]
    required_inputs: [read_processing]
    diagnostic_tests: [test.barcode_offset_scan, test.counterfactual_barcode_reextraction]
    cell_recovery_relationship:
      relationship: direct
      note: "A boundary shift collapses whitelist matching and therefore valid barcodes, which directly starves cell calling."
    sample_integrity_relationship:
      relationship: unlikely
      note: "A boundary shift does not move molecules between samples; it is an extraction geometry error."
    expression_fidelity_relationship:
      relationship: context_dependent
      note: "If barcodes are re-extracted correctly, expression is typically unaffected; residual mis-extraction adds noise."
    recoverability: computationally_recoverable
    recommended_actions:
      - "Re-extract barcodes/UMIs at the scanned offset and re-run downstream steps."
    references: [ref.tenx_3p_v3_userguide]
  - cause_id: cause.read_configuration_mismatch
    title: "Read-configuration mismatch"
    mechanism: "The read layout does not match the chemistry: R1 shorter than cell barcode + UMI, R1/R2 swapped, wrong barcode or UMI length, wrong sample-index cycles, wrong chemistry, or unexpected upstream trimming. A top-tier direct cause of cell-recovery collapse."
    workflow_stage: sequencing
    produces_issues: [issue.barcode_umi_recovery_failure, issue.low_cell_recovery]
    observable_signals: [signal.low_whitelist_match, signal.low_barcode_umi_extractable, signal.called_cells_below_target]
    evidence_against: [signal.high_genome_low_gene_assignment]
    required_inputs: [read_processing]
    diagnostic_tests: [test.read_configuration_audit, test.r1_r2_swap_test]
    cell_recovery_relationship:
      relationship: direct
      note: "If R1 cannot yield a valid barcode+UMI, essentially no barcodes are recovered and cell calling fails."
    sample_integrity_relationship:
      relationship: unlikely
      note: "A configuration error affects all reads uniformly rather than mixing samples."
    expression_fidelity_relationship:
      relationship: context_dependent
      note: "Some mismatches (e.g. swapped reads) are fully recoverable; wrong cycle counts may be unrecoverable."
    recoverability: partially_recoverable
    recommended_actions:
      - "Audit the read layout against the spec; if only extraction is wrong, re-extract; if cycles are wrong, additional sequencing or a rerun may be required."
    references: [ref.tenx_3p_v3_userguide]
  - cause_id: cause.wrong_chemistry_or_whitelist
    title: "Wrong chemistry or barcode whitelist"
    mechanism: "Analysis used the wrong chemistry/whitelist, so the correct barcodes never match the loaded whitelist."
    workflow_stage: read_processing
    produces_issues: [issue.barcode_umi_recovery_failure, issue.low_cell_recovery]
    observable_signals: [signal.low_whitelist_match]
    required_inputs: [read_processing]
    diagnostic_tests: [test.alternative_whitelist_scan, test.read_configuration_audit]
    cell_recovery_relationship:
      relationship: direct
      note: "With the wrong whitelist, valid barcodes are near zero and no cells are called."
    sample_integrity_relationship:
      relationship: unlikely
      note: "Whitelist choice does not mix samples."
    expression_fidelity_relationship:
      relationship: unlikely
      note: "Fully recovered once the correct whitelist is applied."
    recoverability: computationally_recoverable
    recommended_actions:
      - "Scan alternative chemistry whitelists and re-run with the best-matching one."
    references: [ref.tenx_3p_v3_userguide]
  - cause_id: cause.adapter_dimer_or_short_insert
    title: "Adapter dimers or short inserts"
    mechanism: "Adapter-dimer and short-insert molecules consume sequencing capacity and produce adapter-only or read-through reads. Directly relevant to low informative yield. Note: a physical library dimer percentage does not equal the sequenced-read percentage unless cluster-generation bias is modelled."
    workflow_stage: library_prep
    produces_issues: [issue.low_informative_read_yield, issue.abnormal_library_structure]
    observable_signals: [signal.elevated_adapter_only, signal.short_insert_elevated, signal.polyg_tail_elevated]
    evidence_against: [signal.low_full_length_proxy]
    required_inputs: [library_structure]
    diagnostic_tests: [test.adapter_configuration_classification]
    cell_recovery_relationship:
      relationship: indirect
      note: "Reduces usable molecules per cell; only collapses called-cell count if the informative yield falls far enough to starve cell calling."
    sample_integrity_relationship:
      relationship: unlikely
      note: "Dimers do not move molecules between samples."
    expression_fidelity_relationship:
      relationship: unlikely
      note: "Adapter-only reads are discarded rather than mis-quantified."
    recoverability: recoverable_by_additional_sequencing
    recommended_actions:
      - "Classify adapter configurations; if the usable library is sound, additional sequencing recovers depth; severe dimer load may need a cleanup or rebuild."
    references: [ref.wf_single_cell_docs]
  - cause_id: cause.short_or_empty_cdna_products
    title: "Short or empty cDNA products"
    mechanism: "Reverse transcription produced short or empty cDNA, so reads begin with TSO-derived sequence (short-read) or fail the full-length architecture (long-read)."
    workflow_stage: library_prep
    produces_issues: [issue.abnormal_library_structure, issue.low_informative_read_yield]
    observable_signals: [signal.tso_at_read_start, signal.short_insert_elevated, signal.low_full_length_proxy]
    required_inputs: [library_structure]
    diagnostic_tests: [test.adapter_configuration_classification]
    cell_recovery_relationship:
      relationship: indirect
      note: "Lowers informative yield per cell; does not by itself explain a large cell-count collapse."
    sample_integrity_relationship:
      relationship: unlikely
      note: "Not a sample-mixing mechanism."
    expression_fidelity_relationship:
      relationship: context_dependent
      note: "Short products can bias 3' coverage and gene detection."
    recoverability: partially_recoverable
    references: [ref.tenx_3p_v3_userguide]
  - cause_id: cause.insufficient_viable_cell_input
    title: "Insufficient viable-cell input"
    mechanism: "Too few viable cells were loaded, so few real cells can be recovered regardless of downstream processing."
    workflow_stage: sample_prep
    produces_issues: [issue.low_cell_recovery]
    observable_signals: [signal.called_cells_below_target, signal.barcode_rank_no_knee]
    evidence_against: [signal.low_whitelist_match]
    required_inputs: [cell_analysis, wet_lab_qc]
    diagnostic_tests: [test.cell_calling_sensitivity]
    cell_recovery_relationship:
      relationship: direct
      note: "Fewer viable cells loaded directly caps how many can be called."
    sample_integrity_relationship:
      relationship: unlikely
      note: "Low input does not mix samples."
    expression_fidelity_relationship:
      relationship: unlikely
      note: "Recovered cells are still faithfully quantified."
    recoverability: requires_experiment_rerun
    references: [ref.cellranger_web_summary]
  - cause_id: cause.poor_partition_capture_or_rt
    title: "Poor partition capture or RT"
    mechanism: "Inefficient droplet/partition capture or reverse transcription yields few molecules per cell and a weak cell/background separation."
    workflow_stage: library_prep
    produces_issues: [issue.low_cell_recovery, issue.low_informative_read_yield]
    observable_signals: [signal.low_reads_in_cells, signal.called_cells_below_target, signal.barcode_rank_no_knee]
    required_inputs: [cell_analysis, wet_lab_qc]
    diagnostic_tests: [test.cell_calling_sensitivity]
    cell_recovery_relationship:
      relationship: direct
      note: "Poor capture/RT reduces molecules per cell, weakening the knee and lowering called cells."
    sample_integrity_relationship:
      relationship: unlikely
      note: "Not a mixing mechanism."
    expression_fidelity_relationship:
      relationship: context_dependent
      note: "Low capture can bias which transcripts are detected."
    recoverability: requires_experiment_rerun
  - cause_id: cause.low_cdna_or_library_yield
    title: "Low cDNA or library yield"
    mechanism: "Low cDNA/library yield gives shallow, ambient-dominated data with few reads in cells."
    workflow_stage: library_prep
    produces_issues: [issue.low_cell_recovery, issue.low_informative_read_yield]
    observable_signals: [signal.low_reads_in_cells]
    required_inputs: [wet_lab_qc, library_structure]
    diagnostic_tests: [test.cell_calling_sensitivity]
    cell_recovery_relationship:
      relationship: indirect
      note: "Low yield lowers depth and reads-in-cells; whether cells collapse depends on how shallow the data is."
    sample_integrity_relationship:
      relationship: unlikely
      note: "Not a mixing mechanism."
    expression_fidelity_relationship:
      relationship: context_dependent
      note: "Very shallow libraries can distort per-cell expression."
    recoverability: partially_recoverable
  - cause_id: cause.overly_strict_cell_calling
    title: "Overly strict cell calling"
    mechanism: "The cell-calling threshold is too strict, discarding real cells that sit near the knee."
    workflow_stage: cell_calling
    produces_issues: [issue.low_cell_recovery]
    observable_signals: [signal.called_cells_below_target, signal.barcode_rank_no_knee]
    required_inputs: [cell_analysis]
    diagnostic_tests: [test.cell_calling_sensitivity]
    cell_recovery_relationship:
      relationship: direct
      note: "The molecules exist but are excluded by the calling threshold, so relaxing it recovers cells."
    sample_integrity_relationship:
      relationship: unlikely
      note: "A threshold choice does not mix samples."
    expression_fidelity_relationship:
      relationship: unlikely
      note: "Recovered cells are unchanged in their expression."
    recoverability: computationally_recoverable
    references: [ref.cellranger_web_summary]
  - cause_id: cause.read_past_end_or_signal_decay
    title: "Read-past-end or signal decay"
    mechanism: "Sequencing reads past the insert end or suffers signal decay, producing poly-G (two-colour) or no-signal tails."
    workflow_stage: sequencing
    produces_issues: [issue.low_informative_read_yield]
    observable_signals: [signal.polyg_tail_elevated, signal.short_insert_elevated]
    evidence_against: [signal.low_full_length_proxy]
    required_inputs: [library_structure, read_processing]
    diagnostic_tests: [test.adapter_configuration_classification]
    cell_recovery_relationship:
      relationship: unlikely
      note: "Tail artifacts are usually trimmed and rarely explain a large cell-count collapse."
    sample_integrity_relationship:
      relationship: unlikely
      note: "Not a mixing mechanism."
    expression_fidelity_relationship:
      relationship: context_dependent
      note: "If untrimmed, tails can reduce alignment/assignment rates."
    recoverability: computationally_recoverable
  - cause_id: cause.long_read_tso_concatemer_or_fusion
    title: "Long-read TSO concatemer or fused read"
    mechanism: "Long reads contain internal TSO-derived motifs from concatemerised or fused molecules, distinct from short-read TSO read-through at the read start."
    workflow_stage: library_prep
    produces_issues: [issue.abnormal_library_structure, issue.low_informative_read_yield]
    observable_signals: [signal.internal_adapter_elevated, signal.low_full_length_proxy]
    required_inputs: [library_structure]
    diagnostic_tests: [test.internal_tso_scan]
    cell_recovery_relationship:
      relationship: indirect
      note: "Fused/concatemeric reads reduce cleanly assignable molecules but do not directly collapse cell calling."
    sample_integrity_relationship:
      relationship: context_dependent
      note: "A fused read can join molecules from different barcodes; treat as a per-read structural artifact, not established cross-sample hopping."
    expression_fidelity_relationship:
      relationship: context_dependent
      note: "Mis-split concatemers can distort per-molecule assignment."
    recoverability: partially_recoverable
    references: [ref.lebrigand_2020, ref.wf_single_cell_docs]

# ---------------------------------------------------------------------------------------------
diagnostic_tests:
  - test_id: test.barcode_offset_scan
    title: "Barcode offset scan"
    purpose: "Detect a barcode/UMI extraction boundary shift by scanning candidate offsets."
    required_inputs: [read_processing]
    algorithm_summary: "Re-extract the cell barcode at a range of start offsets around the expected position and measure the whitelist-match rate at each offset."
    outputs: "Whitelist-match rate as a function of offset; the offset that maximises the match rate."
    interpretation: "A sharp match-rate peak at a non-zero offset supports a barcode boundary shift; a strong diagnosis also shows restored whitelist rate and ideally improved molecule/cell recovery after re-extraction."
    limitations: "Cannot distinguish a boundary shift from a wrong whitelist if no offset restores the match rate."
    supports_causes: [cause.barcode_boundary_shift]
    rejects_causes: [cause.wrong_chemistry_or_whitelist]
    status: planned
  - test_id: test.alternative_whitelist_scan
    title: "Alternative-whitelist scan"
    purpose: "Identify whether a different chemistry whitelist explains the barcodes."
    required_inputs: [read_processing]
    algorithm_summary: "Match extracted barcodes against several candidate chemistry whitelists and compare match rates."
    outputs: "Per-whitelist match rate; the best-matching chemistry."
    interpretation: "A markedly higher match rate against a different whitelist supports a wrong-chemistry/whitelist cause."
    limitations: "Requires the true chemistry's whitelist to be among the candidates."
    supports_causes: [cause.wrong_chemistry_or_whitelist, cause.barcode_boundary_shift]
    status: planned
  - test_id: test.read_configuration_audit
    title: "Read-configuration audit"
    purpose: "Check that the observed read layout matches the chemistry's expected barcode/UMI/insert geometry."
    required_inputs: [read_processing]
    algorithm_summary: "Compare observed read lengths and segment positions against the spec's read_structure (R1 length vs cell barcode + UMI, expected cycles, orientation)."
    outputs: "A list of mismatches between observed and expected read configuration."
    interpretation: "Any mismatch (e.g. R1 shorter than barcode + UMI) supports a read-configuration cause."
    limitations: "Detects layout mismatches, not whether an otherwise-valid configuration was mis-processed."
    supports_causes: [cause.read_configuration_mismatch, cause.wrong_chemistry_or_whitelist]
    status: planned
  - test_id: test.r1_r2_swap_test
    title: "R1/R2 swap test"
    purpose: "Detect whether read 1 and read 2 were swapped."
    required_inputs: [read_processing]
    algorithm_summary: "Attempt barcode/UMI extraction with R1 and R2 roles swapped and compare whitelist-match rates."
    outputs: "Whitelist-match rate in normal vs swapped orientation."
    interpretation: "A much higher match rate in the swapped orientation supports an R1/R2 swap."
    limitations: "Only distinguishes a swap, not other configuration errors."
    supports_causes: [cause.read_configuration_mismatch]
    status: planned
  - test_id: test.adapter_configuration_classification
    title: "Adapter-configuration classification"
    purpose: "Classify each read by its adapter/handle configuration to quantify full-length, adapter-only, short-insert, and TSO-proximal reads."
    required_inputs: [library_structure]
    algorithm_summary: "Scan each read for the expected adapters/handles and classify by which are present and where; the Nanopore path implements this per-read classification."
    outputs: "Per-configuration read fractions (full-length, adapter-only, short-insert, unclassified)."
    interpretation: "Elevated adapter-only / short-insert fractions support adapter-dimer / short-cDNA causes."
    limitations: "Read-level configuration fractions are not the same as physical library fractions."
    supports_causes: [cause.adapter_dimer_or_short_insert, cause.short_or_empty_cdna_products, cause.read_past_end_or_signal_decay]
    status: implemented
    implemented_by: "qc/nanopore.py: read_classification / handle_detection"
    references: [ref.wf_single_cell_docs]
  - test_id: test.internal_tso_scan
    title: "Internal TSO scan (long-read)"
    purpose: "Detect internal TSO-derived motifs in long reads indicating concatemers or fused molecules."
    required_inputs: [library_structure]
    algorithm_summary: "Scan long reads for TSO-derived motifs occurring internally (away from read ends); the Nanopore path implements this as the tso_concatemer check."
    outputs: "Internal-adapter fraction and per-read internal-motif positions."
    interpretation: "An elevated internal-TSO fraction supports a long-read concatemer/fusion cause; it is distinct from short-read TSO read-through."
    limitations: "Cannot by itself establish cross-sample molecule mixing."
    supports_causes: [cause.long_read_tso_concatemer_or_fusion]
    status: implemented
    implemented_by: "qc/nanopore.py: tso_concatemer"
    references: [ref.lebrigand_2020]
  - test_id: test.cell_calling_sensitivity
    title: "Cell-calling sensitivity analysis"
    purpose: "Assess how called-cell count varies with the cell-calling threshold."
    required_inputs: [cell_analysis]
    algorithm_summary: "Recompute called cells across a range of calling thresholds and inspect where the count stabilises relative to the knee."
    outputs: "Called-cell count as a function of threshold."
    interpretation: "A large increase in called cells when the threshold is relaxed supports overly strict calling; a flat curve points upstream (input/capture)."
    limitations: "Cannot create cells that were never captured; distinguishes calling strictness from upstream loss only when molecules exist near the knee."
    supports_causes: [cause.overly_strict_cell_calling, cause.insufficient_viable_cell_input, cause.poor_partition_capture_or_rt]
    status: planned
  - test_id: test.counterfactual_barcode_reextraction
    title: "Counterfactual barcode re-extraction"
    purpose: "Confirm a barcode boundary shift by re-extracting at the corrected offset and measuring recovery."
    required_inputs: [read_processing, cell_analysis]
    algorithm_summary: "Re-extract barcodes/UMIs at the offset found by the offset scan and recompute whitelist rate and downstream molecule/cell recovery."
    outputs: "Whitelist rate and recovery before vs after counterfactual re-extraction."
    interpretation: "Restored whitelist rate and improved recovery confirm a barcode boundary shift and demonstrate computational recoverability."
    limitations: "Full recovery requires that the shift is the dominant defect."
    supports_causes: [cause.barcode_boundary_shift, cause.read_configuration_mismatch]
    status: planned

# ---------------------------------------------------------------------------------------------
issues:
  - issue_id: issue.low_cell_recovery
    title: "Low called-cell recovery"
    summary: "Far fewer cells were called than the declared target. Many mechanisms can cause this, from barcode-processing errors to insufficient input; the target must be a compatible target type before comparing."
    outcome_domains: [cell_analysis]
    platforms: [illumina, nanopore]
    workflow_stages: [sample_prep, library_prep, read_processing, cell_calling]
    supporting_signals: [signal.called_cells_below_target, signal.barcode_rank_no_knee, signal.low_reads_in_cells, signal.low_whitelist_match]
    candidate_root_causes:
      - cause.barcode_boundary_shift
      - cause.read_configuration_mismatch
      - cause.wrong_chemistry_or_whitelist
      - cause.overly_strict_cell_calling
      - cause.insufficient_viable_cell_input
      - cause.poor_partition_capture_or_rt
      - cause.low_cdna_or_library_yield
    impacts:
      - "Fewer called cells and reduced statistical power"
      - "Potentially biased population representation if loss is non-random"
    required_evidence: [cell_analysis, read_processing]
    missing_evidence:
      - "Viable-cell input / cells-loaded from wet-lab metadata (needed to separate input loss from processing loss)"
      - "Raw FASTQ for counterfactual barcode re-extraction"
    confirmatory_tests:
      - test.barcode_offset_scan
      - test.alternative_whitelist_scan
      - test.read_configuration_audit
      - test.cell_calling_sensitivity
      - test.counterfactual_barcode_reextraction
    recovery_classes: [computationally_recoverable, partially_recoverable, requires_experiment_rerun]
    computational_actions:
      - "Barcode offset / alternative-whitelist scan and re-extraction"
      - "Cell-calling sensitivity sweep"
    sequencing_actions:
      - "Additional sequencing only helps if the library is sound but shallow"
    wetlab_actions:
      - "Confirm viable-cell input and capture efficiency; rerun if input was insufficient"
    related_issues: [issue.barcode_umi_recovery_failure, issue.low_informative_read_yield]
    references: [ref.tenx_3p_v3_userguide, ref.cellranger_web_summary]
    what_this_issue_cannot_explain: "It does not by itself establish cross-sample contamination or expression-fidelity bias; those require their own evidence. A low cell count with a healthy whitelist rate points upstream (input/capture/calling), not to barcode processing."
  - issue_id: issue.low_informative_read_yield
    title: "Low informative-read yield"
    summary: "A large share of sequencing was spent on reads that carry little usable single-cell information (adapter-only, short-insert, TSO-proximal, or tail-artifact reads)."
    outcome_domains: [library_structure, sequencing_run]
    platforms: [illumina, nanopore]
    workflow_stages: [library_prep, sequencing, read_processing]
    supporting_signals: [signal.elevated_adapter_only, signal.short_insert_elevated, signal.tso_at_read_start, signal.polyg_tail_elevated, signal.internal_adapter_elevated, signal.low_full_length_proxy]
    candidate_root_causes:
      - cause.adapter_dimer_or_short_insert
      - cause.short_or_empty_cdna_products
      - cause.read_past_end_or_signal_decay
      - cause.long_read_tso_concatemer_or_fusion
      - cause.low_cdna_or_library_yield
    impacts:
      - "Reduced usable molecules per cell"
      - "Wasted sequencing capacity"
    required_evidence: [library_structure, read_processing]
    missing_evidence:
      - "Physical library QC (e.g. fragment sizing) to relate sequenced-read fractions to library composition"
    confirmatory_tests: [test.adapter_configuration_classification, test.internal_tso_scan]
    recovery_classes: [recoverable_by_additional_sequencing, partially_recoverable, requires_library_rebuild]
    computational_actions:
      - "Classify adapter configurations and quantify recoverable vs discarded reads"
    sequencing_actions:
      - "Additional sequencing recovers depth when the usable library is intact"
    wetlab_actions:
      - "Bead cleanup or library rebuild if adapter-dimer / short-insert load is severe"
    related_issues: [issue.abnormal_library_structure, issue.low_cell_recovery]
    references: [ref.wf_single_cell_docs]
    what_this_issue_cannot_explain: "It does not directly establish a specific called-cell target collapse; relate it to cell recovery only via reads-in-cells depth. A physical library dimer percentage is not the same as the sequenced-read percentage."
  - issue_id: issue.barcode_umi_recovery_failure
    title: "Barcode / UMI recovery failure"
    summary: "Reads cannot be assigned to valid barcodes/UMIs at the expected rate, starving every downstream per-cell metric."
    outcome_domains: [read_processing, cell_analysis]
    platforms: [illumina, nanopore]
    workflow_stages: [read_processing]
    supporting_signals: [signal.low_whitelist_match, signal.low_barcode_umi_extractable, signal.called_cells_below_target]
    candidate_root_causes:
      - cause.barcode_boundary_shift
      - cause.wrong_chemistry_or_whitelist
      - cause.read_configuration_mismatch
    impacts:
      - "Few reads assigned to valid barcodes"
      - "Collapse in called cells and per-cell metrics"
    required_evidence: [read_processing]
    missing_evidence:
      - "Raw FASTQ needed for offset / whitelist / swap scans"
    confirmatory_tests: [test.barcode_offset_scan, test.alternative_whitelist_scan, test.read_configuration_audit, test.r1_r2_swap_test]
    recovery_classes: [computationally_recoverable, partially_recoverable]
    computational_actions:
      - "Barcode offset scan, alternative-whitelist scan, R1/R2 swap test, then re-extract"
    related_issues: [issue.low_cell_recovery]
    references: [ref.tenx_3p_v3_userguide]
    what_this_issue_cannot_explain: "A whitelist/extraction failure does not imply the wet-lab library is bad; it is usually a read-processing/configuration problem and is often computationally recoverable."
  - issue_id: issue.abnormal_library_structure
    title: "Abnormal library structure"
    summary: "Sequenced molecules deviate from the expected architecture (short/empty inserts, TSO-proximal reads, adapter-only reads, or long-read internal motifs)."
    outcome_domains: [library_structure]
    platforms: [illumina, nanopore]
    workflow_stages: [library_prep, read_processing]
    supporting_signals: [signal.tso_at_read_start, signal.internal_adapter_elevated, signal.short_insert_elevated, signal.elevated_adapter_only, signal.low_full_length_proxy]
    candidate_root_causes:
      - cause.short_or_empty_cdna_products
      - cause.adapter_dimer_or_short_insert
      - cause.long_read_tso_concatemer_or_fusion
    impacts:
      - "Molecules deviate from expected architecture"
      - "Downstream extraction/assignment errors"
    required_evidence: [library_structure]
    confirmatory_tests: [test.adapter_configuration_classification, test.internal_tso_scan]
    recovery_classes: [partially_recoverable, requires_library_rebuild]
    computational_actions:
