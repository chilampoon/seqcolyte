name: seqcolyte
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - pip
  - numpy>=1.24
  - pyyaml>=6.0
  - jsonschema>=4.0
  - beautifulsoup4>=4.12
  - lxml>=5.0
  - pysam>=0.22
  - pytest>=8.0
  - seqkit>=2.5
  - seqtk>=1.4
  - pip:
    - docling>=2.108   # PDF parsing (tables + figures); heavy (torch, rapidocr) — pip-only
  # After `conda env create -f environment.yml`, run: pip install -e .
